<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso Liberado</title>
    <style>
        body { background-color: #000; color: #fff; font-family: Arial, sans-serif; text-align: center; margin-top: 50px; }
        h1 { color: #ff004f; font-size: 50px; margin: 10px; }
        p { font-size: 18px; margin-bottom: 30px; padding: 0 10px; }
        .aviso { background-color: #111; border: 2px solid #ff004f; padding: 20px; border-radius: 10px; margin: 20px; }
        .pontinhos { font-size: 20px; font-weight: bold; color: #ff004f; }
    </style>
</head>
<body>
    <p>VOCÊ TEM 5 SEGUNDOS PARA ENTRAR NO GRUPINHO VIP</p>
    <h1 id="cronometro">00:05</h1>
    <div class="aviso">
        <p>🔥 <b>ACESSO VIP LIBERADO</b> 🔥</p>
        <p>Entre com sigilo total e aproveite tudo.</p>
        <br>
        <p>PASSO FINAL: Toque nos <span class="pontinhos">3 PONTOS</span> acima e escolha <span class="pontinhos">ABRIR NO NAVEGADOR</span>.</p>
    </div>
    <script>
        var linkFinal = "https://linkpriv.com/1ec38631-15bb-4"; 
        var navegador = navigator.userAgent || navigator.vendor || window.opera;
        var estaNoApp = (navegador.indexOf("TikTok") > -1) || (navegador.indexOf("Instagram") > -1);
        if (!estaNoApp) { window.location.href = linkFinal; }
        var tempo = 5;
        setInterval(function() {
            if(tempo > 0) {
                tempo--;
                document.getElementById('cronometro').innerText = "00:0" + tempo;
            }
        }, 1000);
    </script>
</body>
</html>
